https_port 8443 tls-cert=/etc/squid/certs/server-cert.pem tls-key=/etc/squid/certs/server-key.pem

auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/users.htpasswd
auth_param basic children 5 startup=1 idle=1
auth_param basic realm steam-web-test-proxy
auth_param basic credentialsttl 1 minute

acl authenticated proxy_auth REQUIRED
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow authenticated
http_access deny all

cache deny all
cache_mem 8 MB
maximum_object_size 0 KB

access_log none
cache_log /dev/null
cache_store_log none
pid_filename /tmp/squid.pid
coredump_dir /var/spool/squid
